<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>WhatsApp</h2>
                <span>Dashboard</span>
            </div>
            <div class="menu">
                <button class="menu-btn active">🏠 Dashboard</button>
                <button class="menu-btn">📞 Accounts</button>
                <button class="menu-btn">💬 Messages</button>
                <button class="menu-btn">🚀 Workflow</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <!-- Header -->
            <header>
                <div>
                    <h1>WhatsApp Automation</h1>
                    <p id="status">Ready...</p>
                </div>
                <button id="logout">Logout</button>
            </header>

            <!-- Accounts Section -->
            <section class="card">
                <div class="card-header">
                    <h2>📞 Accounts</h2>
                    <div>
                        <button id="loadAccounts">Load</button>
                        <button id="clearAccounts">Clear</button>
                    </div>
                </div>
                <textarea id="accounts" placeholder="Paste numbers here...&#10;&#10;212600000000&#10;34652092716&#10;212640000000"></textarea>
                <div class="small">One number per line</div>
            </section>

            <!-- Messages Section -->
            <section class="card">
                <div class="card-header">
                    <h2>💬 Messages</h2>
                    <div>
                        <button id="loadMessages">Load</button>
                        <button id="clearMessages">Clear</button>
                    </div>
                </div>
                <textarea id="messages" placeholder="One message per line...&#10;&#10;السلام عليكم&#10;مرحبا بكم&#10;مساء الخير"></textarea>
                <div class="small">One message per line</div>
            </section>

            <!-- Upload Image Section -->
            <section class="card">
                <div class="card-header">
                    <h2>🖼️ Upload Image</h2>
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="file" id="imageInput" accept="image/*" style="flex:1; padding:10px; background:#1e293b; border:1px solid #1f2937; border-radius:8px; color:white;" />
                    <button id="uploadImageBtn" style="background:#2563eb; border:none; padding:10px 20px; border-radius:8px; color:white;">Upload</button>
                </div>
                <div id="uploadResult" style="margin-top:12px; color:#94a3b8;"></div>
            </section>

            <!-- Schedule Section -->
            <section class="card">
                <div class="card-header">
                    <h2>⏰ Schedule Daily Run</h2>
                </div>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <input type="time" id="scheduleTime" style="padding:10px; background:#1e293b; border:1px solid #1f2937; border-radius:8px; color:white;" />
                    <button id="setScheduleBtn" style="background:#16a34a; border:none; padding:10px 20px; border-radius:8px; color:white;">Save Schedule</button>
                    <button id="loadScheduleBtn" style="background:#475569; border:none; padding:10px 20px; border-radius:8px; color:white;">Load Schedule</button>
                </div>
                <div id="scheduleStatus" style="margin-top:12px; color:#94a3b8;"></div>
            </section>

            <!-- Action Buttons (Save All & Run Workflow) -->
            <section class="card action-card">
                <button id="saveAll" class="save">💾 Save All</button>
                <button id="runWorkflow" class="run" disabled>🚀 Run Workflow</button>
            </section>

            <!-- Logs Section -->
            <section class="card">
                <h2>Logs</h2>
                <div id="logs">Waiting...</div>
            </section>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
