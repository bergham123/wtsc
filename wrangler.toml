name = "wtsc"
main = "worker.js"
compatibility_date = "2024-11-01"

# ملاحظة: الـ secrets (GITHUB_TOKEN) ما تحطهاش هنا فهاد الملف
# دخلها من Cloudflare Dashboard > Workers > Settings > Variables and Secrets
# أو عبر الأمر: wrangler secret put GITHUB_TOKEN

[vars]
GITHUB_OWNER = "bergham123"
GITHUB_REPO = "wtsc"
GITHUB_BRANCH = "main"
WORKFLOW_FILE = "send.yml"
MESSAGES_PATH = "messages.json"
CONTACTS_PATH = "contacts.json"
